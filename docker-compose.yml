version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: sellform-postgres
    environment:
      POSTGRES_USER: sellform
      POSTGRES_PASSWORD: sellformpassword
      POSTGRES_DB: sellform_dev
    ports:
      - "5544:5432"
    volumes:
      - sellform_postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: sellform-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

volumes:
  sellform_postgres_data:
  redis_data:
